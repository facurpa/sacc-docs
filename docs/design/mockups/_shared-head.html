<!-- Bloco <head> + shell compartilhado dos mockups do SACC.
     Copiar este bloco em cada mockup para garantir consistência.
     CDN usado APENAS para visualização dos mockups; o produto real usa build normal. -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="sacc">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SACC — Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style type="text/tailwindcss">
@plugin "daisyui";
@plugin "daisyui/theme" {
  name: "sacc"; default: true; color-scheme: light;
  --color-primary: #155E75;   --color-primary-content: #FFFFFF;
  --color-secondary: #475569; --color-secondary-content: #FFFFFF;
  --color-accent: #0D9488;    --color-accent-content: #FFFFFF;
  --color-neutral: #1E293B;   --color-neutral-content: #F1F5F9;
  --color-base-100: #FFFFFF;  --color-base-200: #F1F5F9;
  --color-base-300: #E2E8F0;  --color-base-content: #0F172A;
  --color-info: #0369A1;      --color-info-content: #FFFFFF;
  --color-success: #15803D;   --color-success-content: #FFFFFF;
  --color-warning: #B45309;   --color-warning-content: #FFFFFF;
  --color-error: #B91C1C;     --color-error-content: #FFFFFF;
}
@plugin "daisyui/theme" {
  name: "saccdark"; color-scheme: dark;
  --color-primary: #38BDF8;   --color-primary-content: #082F49;
  --color-secondary: #94A3B8; --color-secondary-content: #0F172A;
  --color-accent: #2DD4BF;    --color-accent-content: #042F2E;
  --color-neutral: #334155;   --color-neutral-content: #E2E8F0;
  --color-base-100: #0F172A;  --color-base-200: #1E293B;
  --color-base-300: #334155;  --color-base-content: #CBD5E1;
  --color-info: #38BDF8;      --color-info-content: #082F49;
  --color-success: #4ADE80;   --color-success-content: #052E16;
  --color-warning: #FBBF24;   --color-warning-content: #451A03;
  --color-error: #F87171;     --color-error-content: #450A0A;
}
body { font-family: 'Inter', system-ui, sans-serif; }
.tnum { font-variant-numeric: tabular-nums; }
</style>
</head>
<body class="bg-base-200 min-h-screen">
<!-- App shell: sidebar dark (data-theme="saccdark") + topbar. Ver design-system.md. -->
<div class="flex min-h-screen">
  <aside data-theme="saccdark" class="w-64 shrink-0 bg-base-100 text-base-content flex flex-col">
    <div class="h-16 flex items-center gap-2 px-4 border-b border-base-300">
      <span class="font-bold text-lg text-primary">SACC</span>
      <span class="text-xs opacity-60">Alertas Contábeis</span>
    </div>
    <nav class="flex-1 p-2">
      <ul class="menu gap-1">
        <!-- item ativo: class="active" (bg-primary/10 text-primary) -->
        <li><a class="active">Dashboard</a></li>
        <li><a>Execuções</a></li>
        <li><a>Plano de Contas</a></li>
        <li><a>Destinatários</a></li>
        <li><a>Templates de E-mail</a></li>
        <li class="menu-title mt-2">Administração</li>
        <li><a>Usuários</a></li>
        <li><a>Auditoria</a></li>
        <li><a>Configurações</a></li>
      </ul>
    </nav>
    <div class="p-4 border-t border-base-300 text-xs opacity-60">Cast Informática</div>
  </aside>
  <div class="flex-1 flex flex-col">
    <header class="h-16 bg-base-100 border-b border-base-300 flex items-center justify-between px-6">
      <span class="text-sm text-base-content/60">Ambiente interno</span>
      <div class="flex items-center gap-3">
        <span class="text-sm">Maria Silva</span>
        <div class="avatar placeholder"><div class="bg-neutral text-neutral-content w-8 rounded-full"><span class="text-xs">MS</span></div></div>
      </div>
    </header>
    <main class="flex-1 p-6">
      <div class="max-w-screen-xl mx-auto space-y-6">
        <!-- CONTEÚDO DA TELA AQUI -->
      </div>
    </main>
  </div>
</div>

<!-- Switcher de estados (canto inferior esquerdo): mostra/esconde <section data-estado="..."> -->
<div class="fixed bottom-4 left-4 z-50 join shadow" data-theme="saccdark">
  <button class="btn btn-sm join-item" onclick="mostrarEstado('sucesso')">Sucesso</button>
  <button class="btn btn-sm join-item" onclick="mostrarEstado('loading')">Loading</button>
  <button class="btn btn-sm join-item" onclick="mostrarEstado('empty')">Empty</button>
  <button class="btn btn-sm join-item" onclick="mostrarEstado('error')">Error</button>
</div>
<script>
function mostrarEstado(e){
  document.querySelectorAll('[data-estado]').forEach(s=>s.classList.toggle('hidden', s.dataset.estado!==e));
}
mostrarEstado('sucesso');
</script>
</body>
</html>
